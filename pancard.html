<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PAN Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
        }
        .pan-card {
            width: 420px;
            height: 260px;
            background: #e6f0ff;
            border: 2px solid #003366;
            border-radius: 8px;
            padding: 12px;
            margin: 50px auto;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            font-weight: bold;
            color: #003366;
            font-size: 14px;
        }
        .content {
            display: flex;
            margin-top: 15px;
        }
        .photo {
            width: 100px;
            height: 120px;
            border: 1px solid #000;
            text-align: center;
            line-height: 120px;
            font-size: 12px;
            background: #fff;
        }
        .details {
            margin-left: 15px;
            font-size: 13px;
        }
        .details p {
            margin: 6px 0;
        }
        .footer {
            margin-top: 15px;
            font-size: 11px;
            color: #333;
        }
    </style>
</head>
<body>

<div class="pan-card">
    <div class="header">
        PAN CARD<br>
        GOVERNMENT OF INDIA
    </div>

    <div class="content">
        <div class="photo">
            PHOTO
        </div>

        <div class="details">
            <p><strong>Name:</strong> Akshith Reddy</p>
            
            <p><strong>Date of Birth:</strong> DD/MM/YYYY</p>
            <p><strong>PAN:</strong> ABCDE1234F</p>
            <p><strong>Place:</strong> Hyderabad</p>
        </div>
    </div>

    <div class="footer">
        Permanent Account Number Card
    </div>
</div>

</body>
</html>
