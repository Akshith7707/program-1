<!DOCTYPE html>
<html>
<head>
    <title>Driving License</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .card {
            width: 420px;
            border: 2px solid #000;
            padding: 20px;
            background-color: #ffffff;
        }

        h2 {
            text-align: center;
            margin-bottom: 4px;
            color: #1a237e;
            font-size: 18px;
        }

        h3 {
            text-align: center;
            margin-top: 0;
            font-size: 14px;
            font-weight: normal;
        }

        p {
            margin: 6px 0;
            font-size: 14px;
        }

        .photo {
            width: 90px;
            height: 110px;
            border: 1px solid #000;
            text-align: center;
            line-height: 110px;
            font-size: 12px;
        }

        .details {
            display: flex;
            gap: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>DRIVING LICENCE</h2>
        <h3>Government of India</h3>

        <div class="details">
            <div class="photo">Photo</div>
            <div>
                <p><b>Name:</b> Akshith Reddy</p>

                <p><b>Date of Birth:</b> 15/08/2002</p>
                <p><b>Blood Group:</b> O+</p>
            </div>
        </div>

        <p><b>Licence No:</b> TS09 20230012345</p>
        <p><b>Vehicle Class:</b> MCWG, LMV</p>
        <p><b>Issue Date:</b> 10/06/2023</p>
        <p><b>Valid Till:</b> 09/06/2043</p>
        <p><b>Address:</b> Hyderabad, Telangana</p>

        <p><b>Issuing Authority:</b> RTO Hyderabad</p>

    </div>

</body>
</html>
