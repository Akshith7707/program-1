<!DOCTYPE html>
<html>
<head>
    <style>
        h1 { color: green; text-align: center; }
        h2 { color: blue; text-align: center; }
        p { color: red; }
        table { background-color: cyan; }
        td { color: red; font-size: 24px; }
        input, select { color: blue; font-size: 24px; text-align: center; }
    </style>
</head>
<body>

<h1>Election Commission Portal</h1>
<h2>Voter Registration Form (Form 6)</h2>

<form action="#">
    <table border="5" align="center" cellspacing="10" cellpadding="10">
        <tr color:red>
            <td>Full Name</td>
            <td><input type="text" placeholder="As per Aadhaar" required></td>
        </tr>

        <tr>
            <td>Date of Birth</td>
            <td><input type="date" required style="width: 100%;"></td>
        </tr>

        <tr>
            <td>Gender</td>
            <td>
                <input type="radio" name="g"> Male
                <input type="radio" name="g"> Female
                <input type="radio" name="g"> Other
            </td>
        </tr>

        <tr>
            <td>Mobile Number</td>
            <td><input type="tel" maxlength="10"></td>
        </tr>

        <tr>
            <td>Permanent Address</td>
            <td><textarea rows="5" cols="20" placeholder="House No, Street, Ward..."></textarea></td>
        </tr>

        <tr>
            <td>State / UT</td>
            <td>
                <select required>
                    <option>--SELECT STATE--</option>
                    <option>Telangana</option>
                    <option>Andhra Pradesh</option>
                    <option>Karnataka</option>
                    <option>Maharashtra</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>ID Proof Type</td>
            <td>
                <select>
                    <option>Aadhaar Card</option>
                    <option>PAN Card</option>
                    <option>Driving License</option>
                    <option>Passport</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>Upload Photo</td>
            <td><input type="file" style="font-size: 14px;"></td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <input type="submit" value="Submit Application">
                <input type="reset" value="Clear Form">
            </td>
        </tr>
    </table>
</form>

</body>
</html>
