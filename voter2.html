<!DOCTYPE html>
<html>
<head>
    <style>
        h1 { color: green; text-align: center; }
        h2 { color: blue; text-align: center; }
        
        /* Table Styling */
        table { border-collapse: collapse; width: 60%; margin: auto; }
        td { color: red; font-size: 24px; padding: 10px; border: 1px solid #000; }
        
        /* Logic for different row colors */
        tr:nth-child(odd) { background-color: #ffffff; } /* White */
        tr:nth-child(even) { background-color: #d1f2eb; } /* Light Teal */
        tr:hover { background-color: #fcf3cf; } /* Highlight on hover */

        input, select { color: blue; font-size: 20px; text-align: center; }
    </style>
</head>
<body>

<h1>Election Commission</h1>
<h2>Voter Registration Form</h2>

<form>
    <table border="5" align="center">
        <tr>
            <td style="background-color: magenta;">Full Name</td>
            <td><input type="text"></td>
        </tr>
        <tr>
            <td style="background-color: violet;">Date of Birth</td>
            <td><input type="date"></td>
        </tr>
        <tr>
            <td style="background-color: purple;">Gender</td>
            <td>
                <input type="radio" name="g"> Male
                <input type="radio" name="g"> Female
            </td>
        </tr>
        <tr>
            <td style="background-color: orange;">Address</td>
            <td><textarea rows="3" cols="20"></textarea></td>
        </tr>
        <tr>
            <td style="background-color: yellow;">State</td>
            <td>
                <select>
                    <option>Select State</option>
                    <option>Telangana</option>
                    <option>Delhi</option>
                </select>
            </td>
        </tr>
        <tr>
            <td style="background-color: green;">Identity Proof</td>
            <td><input type="file"></td>
        </tr>
        <tr>
            <td colspan="2" align="center" style="background-color: cyan;">
                <input type="submit" value="Register">
                <input type="reset" value="Clear">
            </td>
        </tr>
    </table>
</form>

</body>
</html>
