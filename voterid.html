<!DOCTYPE html>
<html>
<head>
    <title>Voter ID Card - Telangana</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .card {
            width: 350px;
            border: 2px solid black;
            padding: 20px;
            background-color: white;
            text-align: left;
        }

        h2 {
            text-align: center;
            margin-bottom: 5px;
        }

        h3 {
            text-align: center;
            margin-top: 0;
            color: green;
        }

        p {
            margin: 8px 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Voter ID Card</h2>
        <h3>Government of Telangana</h3>

        <p><b>Name:</b> Akshith Reddy</p>
        <p><b>Age:</b> 21</p>
        <p><b>Gender:</b> Male</p>
        <p><b>State:</b> Telangana</p>
        <p><b>Address:</b> Hyderabad</p>
    </div>

</body>
</html>
