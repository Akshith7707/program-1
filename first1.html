<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Registration</title>
    <link href="register.css" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <h1>DevOps Lab</h1>
        <h2>Student Registration Form</h2>
        <form action="#" method="post">
            <table>
                <tr>
                    <td>Name</td>
                    <td><input type="text" name="name" required></td>
                </tr>
                <tr>
                    <td>Contact Number</td>
                    <td><input type="tel" name="contact" required></td>
                </tr>
                <tr>
                    <td>Gender</td>
                    <td>
                        <label><input type="radio" name="gender" value="Male"> Male</label>
                        <label><input type="radio" name="gender" value="Female"> Female</label>
                    </td>
                </tr>
                <tr>
                    <td>Address</td>
                    <td><textarea rows="5" cols="20" name="address" required></textarea></td>
                </tr>
                <tr>
                    <td>Hobbies</td>
                    <td>
                        <label><input type="checkbox" name="hobbies[]" value="Singing"> Singing</label>
                        <label><input type="checkbox" name="hobbies[]" value="Travelling"> Travelling</label>
                        <label><input type="checkbox" name="hobbies[]" value="Reading novels"> Reading novels</label>
                    </td>
                </tr>
                <tr>
                    <td>Skillset</td>
                    <td>
                        <label><input type="checkbox" name="skills[]" value="C"> C</label>
                        <label><input type="checkbox" name="skills[]" value="Python"> Python</label>
                        <label><input type="checkbox" name="skills[]" value="Java"> Java</label>
                    </td>
                </tr>
                <tr>
                    <td>Highest Qualification</td>
                    <td>
                        <select name="qualification" required>
                            <option value="">--SELECT--</option>
                            <option>Ph.D</option>
                            <option>M.E/M.Tech</option>
                            <option>B.E/B.Tech</option>
                            <option>Diploma</option>
                            <option>Inter</option>
                            <option>SSC</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>District</td>
                    <td>
                        <select name="district" required>
                            <option value="">--SELECT--</option>
                            <option>District 1</option>
                            <option>District 2</option>
                            <option>District 3</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <input type="submit" value="Register">
                        <input type="reset" value="Clear">
                    </td>
                </tr>
            </table>
        </form>
    </div>
</body>
</html>
