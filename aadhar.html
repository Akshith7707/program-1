<!DOCTYPE html>
<html>
<head>
    <title>Aadhaar Card</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .card {
            width: 380px;
            border: 2px solid black;
            padding: 20px;
            background-color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 5px;
            color: #d32f2f;
        }

        h3 {
            text-align: center;
            margin-top: 0;
            font-size: 14px;
        }

        p {
            margin: 8px 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Government of India</h2>
        <h3>Unique Identification Authority of India</h3>

        <p><b>Name:</b> Akshith Reddy</p>
        <p><b>Aadhaar Number:</b> 1234 5678 9012</p>
        <p><b>Age:</b> 21</p>
        <p><b>Gender:</b> Male</p>
        <p><b>Address:</b> Hyderabad</p>
    </div>

</body>
</html>
