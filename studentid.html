<!DOCTYPE html>
<html>
<head>
    <title>Student ID Card</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .card {
            width: 380px;
            border: 2px solid black;
            padding: 20px;
            background-color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 5px;
            color: #0d47a1;
        }

        h3 {
            text-align: center;
            margin-top: 0;
            font-size: 14px;
        }

        p {
            margin: 8px 0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>MVSR Engineering College</h2>
        <h3>Student Identity Card</h3>

        <p><b>Name:</b> Akshith Reddy</p>
        <p><b>Roll No:</b> 28</p>
        <p><b>Course:</b> B.Tech</p>
        <p><b>Branch:</b> Engineering</p>
        <p><b>College:</b> MVSR Engineering College</p>
        <p><b>Address:</b> Hyderabad</p>
    </div>

</body>
</html>
